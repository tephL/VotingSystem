<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="src/jquery.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/login.css">
    <title>Document</title>
</head>
<body>
    <div id="registerForm">
        <h1 id="title">UniVote</h1>
        <p id="subtitle">Create your account</p>
        <p id="hint"></p>
        <input type="text" id="studentid" placeholder="Student ID" minlength="10" maxlength="10" inputmode="numeric" autocomplete="off1">
        <input type="email" id="email" placeholder="Email" autocomplete="off">
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password (min. 8 characters)" autocomplete="off">
        <input type="password" id="confirmpassword" placeholder="Confirm Password" autocomplete="off">
        <button type="button" id="registerBtn" autocomplete="off">Register</button>
        <p>Already have an account? <a href="index.html">Login</a></p>
    </div>

    <script src="src/auth.js"></script>
</body>
</html>
